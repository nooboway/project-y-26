services:
  - type: web
    name: project-y-26
    env: node
    # Uses the root build command
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REPLY_WEBHOOK_URL
        sync: false
