kind = "web"
previewPath = "/"
title = "For Yin"
version = "1.0.0"
id = "artifacts/for-yin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24991

[services.development]
run = "pnpm --filter @workspace/for-yin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/for-yin", "run", "build" ]
publicDir = "artifacts/for-yin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24991"
BASE_PATH = "/"
